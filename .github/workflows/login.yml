name: 一键登录

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00
    - cron: '0 0 * * *'
  push:
    branches: [main, feat/*]
  workflow_dispatch:
    inputs:
      login_key:
        description: '账号:密码（留空则使用 Secret）'
        required: false
        type: string

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 缓存 Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: 缓存 Cookie
        uses: actions/cache@v4
        with:
          path: cache
          key: cookies-${{ runner.os }}

      - name: 安装依赖
        run: |
          npm install
          npx playwright install chromium

      - name: 执行登录
        run: node login.js
        env:
          LOGIN_KEY: ${{ inputs.login_key || secrets.LOGIN_KEY }}

      - name: 登录失败上报 Issue
        if: failure()
        shell: bash
        run: |
          cat <<'ISSUE' > /tmp/issue-body.md
          ## 登录失败

          - **时间**: $(date -u '+%Y-%m-%d %H:%M UTC')
          - **运行编号**: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          请检查凭据或是否需要验证码。
          ISSUE
          gh issue create \
            --title "一键登录失败 - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body-file /tmp/issue-body.md \
            --label "bug"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}
