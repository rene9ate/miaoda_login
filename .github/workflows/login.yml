name: 一键登录

on:
  workflow_dispatch:
    inputs:
      login_key:
        description: '账号:密码'
        required: true
        type: string
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: 执行登录
        id: login
        run: node login.js
        env:
          LOGIN_KEY: ${{ secrets.LOGIN_KEY }}

      - name: 登录失败上报 Issue
        if: failure()
        run: |
          gh issue create \
            --title "🚨 一键登录失败 - $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --body "## ❌ 登录失败

| 项目 | 内容 |
|------|------|
| 时间 | $(date -u '+%Y-%m-%d %H:%M UTC') |
| 运行编号 | [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

请检查 LOGIN_KEY 是否正确或账号是否需要验证码。
" \
            --label "bug"
        env:
          GH_TOKEN: ${{ github.token }}
